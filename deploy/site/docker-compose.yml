services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    restart: unless-stopped
    networks:
      - internal
      - proxy_network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy_network"
      - "traefik.http.routers.goolang-frontend.rule=Host(`dev.benardkimani.co.ke`)"
      - "traefik.http.routers.goolang-frontend.entrypoints=websecure"
      - "traefik.http.routers.goolang-frontend.tls.certresolver=myresolver"
      - "traefik.http.services.goolang-frontend.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3

  go-server:
    build:
      context: ../../
      dockerfile: deploy/site/Dockerfile.server
    restart: unless-stopped
    networks:
      - internal
    environment:
      - APP_ENV=production
      - APP_DEFAULT_LOG_LEVEL=info
      - APP_JSON_LOGS=true
      - APP_DATABASE_DSN=/app/data/app.db
    volumes:
      - goolang-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  goolang-data:

networks:
  internal:
    driver: bridge
  proxy_network:
    external: true
